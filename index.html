<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>实用小工具集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .tools-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }
    
    a.btn {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>🛠️ 实用小工具</h1>
      <button class="btn" onclick="toggleTheme()" style="padding: 0.4rem; font-size: 1.2rem; border-radius: 50%; width: 2.8rem; height: 2.8rem; flex-shrink: 0;" id="theme-btn">☀️</button>
    </div>
    
    <div class="tools-list">
      <a href="shudu.html" class="btn btn-block primary">
        🧩 数独
      </a>
      <a href="3xia-product.html" class="btn btn-block primary">
        ✖️ 乘法口算训练
      </a>
    </div>
  </div>

  <script>
    function initTheme() {
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light-mode');
        document.getElementById('theme-btn').textContent = '🌙';
      }
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light-mode');
      document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    initTheme();
  </script>
</body>
</html>
